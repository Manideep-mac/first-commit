<!DOCTYPE html>
<html>
<head>
<style>
table{
    border="1"; cellspacing="1";
    margin:auto;
}
td{
    border:2px solid gray;
    text-align:center;
    vertical-align:middle;
    font-size:24px;
    width:90px;
    height:60px;
}
</style>
</head>

<body>

<table border="1" style="background-color: black;">
    <h1 style="text-align:center;"><b>Table-5:</b></h1>
<tr>
    <td style="background:yellow;">1</td>
    <td colspan="2" style="background:yellow;">2</td>
    <td colspan="2" style="background:yellow;">3</td>
</tr>

<tr>
    <td colspan="2" rowspan="2" style="background:lightblue;">4</td>
    <td colspan="4" style="background:lightblue;">5</td>
</tr>

<tr>
    <td colspan="2" style="background:lightgreen;">6</td>
    <td rowspan="3" colspan="2" style="background:lightgreen;">7</td>
</tr>

<tr>
    <td rowspan="5" style="background:beige;">8</td>
    <td style="background:beige;">9</td>
    <td style="background:beige;">10</td>
    <td rowspan="2" style="background:beige;">11</td>
</tr>

<tr>
    <td colspan="2" style="background:salmon;">12</td>
</tr>

<tr>
    <td rowspan="4" style="background:pink;">13</td>
    <td colspan="3" style="background:pink;">14</td>
</tr>

<tr>
    <td colspan="2" style="background:tomato;">15</td>
    <td style="background:tomato;">16</td>
</tr>

<tr>
    <td colspan="4" style="background:gold;">17</td>
</tr>

</table>

</body>
</html>
