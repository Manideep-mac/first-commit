<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>
    <form action="https://script.google.com/macros/s/AKfycbxNZDnaMFkHKdS_dryuQ2QU7D3YwxbhB5q2trlTXEm52L0C3xhUeL3wMY_BlXG4bpqkcA/exec" method="post">
        <label for="First name">First name:</label>
        <input type="text" id="First name" name="firstName">
        <label for="Last name">Last name:</label>
        <input type="text" id="Last name" name="lastName">
        <div>
            <h1> </h1>
        </div>
        <div>
            <label for="date of birth">Date of birth:</label>
            <input type="date" id="date of birth" name="dob">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age">
        </div>
        <div>
            <h1> </h1>
        </div>
        <div>
            <label for="Gender">Gender:</label>
            <select id="Gender" name="gender">
                <option value="Male" checked>Male</option>
                <option value="Female">Female</option>
                <option value="Others">Others</option>
            </select>
            <label for="email address">Email Address:</label>
            <input type="text" id="email address" placeholder="enter email address" name="email">
        </div>
        <br><br>
        <div>
            <label for="positions available">Positions Available:</label>
            <input type="radio" name="position" value="Junior Developer">
<label>Junior Developer</label>

<input type="radio" name="position" value="Mid-Level Developer">
<label>Mid-Level Developer</label>

<input type="radio" name="position" value="Senior Developer">
<label>Senior Developer</label>
        </div>
        <br></br>
        <div>
            <label for="programming languages">Programing Languages:</label>
            <input type="checkbox" name="languages" value="Java">
<label>Java</label>

<input type="checkbox" name="languages" value="JavaScript">
<label>JavaScript</label>

<input type="checkbox" name="languages" value="Python">
<label>Python</label>
        </div>
        <br></br>
        <div>
            <label for="password">Password:</label>
            <input type="text" id="password" name="password"> 
            <label for="confirm password">Confirm Password:</label>
            <input type="text" id="confirm password" name="confirmPassword">
        </div>
        <button>Submit</button>

        <button>Reset</button>
    </for>
</body>
</html>
