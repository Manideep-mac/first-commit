<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Form Types Demo</title>
</head>
<body>

    <h1>All Form Types Demo</h1>

    <form action="https://script.google.com/macros/s/AKfycbx5pziVu9cXUB6tXcx-3DlS5wKerLCt4LoTP1xb5vXYW6vmd7v72RyCDI-LkENQC-PITQ/exec" method="post">

        <label>Text:</label>
        <input type="text" name="text" placeholder="Your name"><br><br>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Secret"><br><br>

        <label>Email:</label>
        <input type="email" name="email" placeholder="you@example.com"><br><br>

        <label>URL:</label>
        <input type="url" name="url" placeholder="https://example.com"><br><br>

        <label>Telephone:</label>
        <input type="tel" name="telephone" placeholder="91 98765 43210"><br><br>

        <label>Search:</label>
        <input type="search" name="search" placeholder="Search term"><br><br>

        <label>Number:</label>
        <input type="number" name="number"><br><br>

        <label>Range:</label>
        <input type="range" name="range" min="0" max="100"><br><br>

        <label>Date:</label>
        <input type="date" name="date">

        <label>Time:</label>
        <input type="time" name="time">

        <label>Week:</label>
        <input type="week" name="week">

        <label>Month:</label>
        <input type="month" name="month"><br><br>

        <label>File:</label>
        <input type="file" name="file"><br><br>

        <label>Color:</label>
        <input type="color" name="color"><br><br>

        <label>Terms and conditions:</label>
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the terms</label><br>

        <input type="checkbox" id="news" checked>
        <label for="news">Subscribe to newsletter</label><br><br>

        <label>Gender:</label><br>

        <input type="radio" name="gender" id="male">
        <label for="male">Male</label><br>

        <input type="radio" name="gender" id="female">
        <label for="female">Female</label><br>

        <input type="radio" name="gender" id="other" checked>
        <label for="other">Other</label><br><br>

        <label>Country (single select):</label>

        <select>
            <option>-- choose --</option>
            <option>India</option>
            <option>USA</option>
            <option>Canada</option>
            <option>Australia</option>
        </select>

        <br><br>

        <label>Message:</label><br>

        <textarea rows="5" cols="40" placeholder="Write something..."></textarea>

        <br><br>

        <input type="submit" value="Submit Form">
        <input type="reset" value="Reset Form">

    </form>

</body>
</html>
</body>
</html>
