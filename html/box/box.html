<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <link rel="stylesheet" href="boxstyle.css">
    
</head>
<body>
    <div class="id-card">

        <div class="header">
            <h1>IDENTIFICATION CARD</h1>
        </div>

        <div class="content">

            <div class="left">

                <img src="/assests/virat img-.jpg" alt="Profile">

            </div>

            <div class="right">

                <div class="row">
                    <span class="label">Name:</span>
                    <span class="value">Virat Kohli</span>
                </div>

                <div class="row">
                    <span class="label">Title:</span>
                    <span class="value">Cricketer</span>
                </div>

                <div class="row">
                    <span class="label">ID No:</span>
                    <span class="value">18</span>
                </div>

                <div class="row">
                    <span class="label">Issued:</span>
                    <span class="value">18/08/2008</span>
                </div>

                <div class="row">
                    <span class="label">Expires:</span>
                    <span class="value">21/11/2027</span>
                </div>

                <h2>SPORTS</h2>

            </div>

        </div>

    </div>
</body>
</html>
