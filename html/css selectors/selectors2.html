<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone Store</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body>

<header class="header">

    <div class="logo">
        💻 Grab It
    </div>

    <div class="search">
        <input type="text" placeholder="Search Products">
    </div>

    <div class="nav">
        <a href="#">Home</a>
        <a href="#">Orders</a>
        <a href="#">Cart</a>
    </div>

</header>

<section class="products">

    <div class="card">
        <h2 class="product-name">Laptop</h2>

        <div class="offer">
            <p class="price">₹54,999</p>
        </div>

        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name discount">Smart Phone</h2>

        <div class="offer">
            <p class="price">₹22,999</p>
        </div>

        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name">Wireless Earbuds</h2>

        <div class="offer">
            <p class="price">₹2,199</p>
        </div>

        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name discount">Smart Watch</h2>

        <div class="offer">
            <p class="price">₹4,499</p>
        </div>

        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name">Gaming Mouse</h2>

        <div class="offer">
            <p class="price">₹999</p>
        </div>

        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name discount">Bluetooth Speaker</h2>

        <div class="offer">
            <p class="price">₹1,899</p>
        </div>

        <button>Add to Cart</button>
    </div>

</section>

</body>
</html>
